# 纯 ClassPathXmlApplicationContext（bean/*.xml）使用：一次加载全部占位符，避免多个 property-placeholder 顺序问题
# 与 application.yml 中 game.datasource / game.redis 对齐
# JDBC 仅配置 MySQL；测试同样走本文件（无 test 覆盖时），不引入 H2。
# 若报 Unknown database：先建库 db_0/db_1/db_2，再执行 src/test/resources/sql/init.sql

# --- datasource ---
game.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 与 MySQL 8 本地开发常用：SSL、公钥、时区（可按环境调整）
game.datasource.url-params=useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
game.datasource.db0.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB0:db_0}?${game.datasource.url-params}
game.datasource.db0.username=${MYSQL_USER:root}
game.datasource.db0.password=${MYSQL_PASSWORD:123456}
game.datasource.db1.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB1:db_1}?${game.datasource.url-params}
game.datasource.db1.username=${MYSQL_USER:root}
game.datasource.db1.password=${MYSQL_PASSWORD:123456}
game.datasource.db2.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB2:db_2}?${game.datasource.url-params}
game.datasource.db2.username=${MYSQL_USER:root}
game.datasource.db2.password=${MYSQL_PASSWORD:123456}

# --- redis ---
game.redis.host=${REDIS_HOST:127.0.0.1}
game.redis.port=${REDIS_PORT:6379}
game.redis.timeout-ms=${REDIS_TIMEOUT_MS:3000}

# --- db feature flags ---
game.db.use-redis-flag=${GAME_DB_USE_REDIS:true}
