# game-db：数据源、Redis、DB 行为（分片、异步等）；与 game-core 的 application.yml 由 Spring Boot 合并加载
game:
  db:
    id: 1
    use-redis-flag: ${GAME_DB_USE_REDIS:true}
    async-save-worker-size: 1
    async-select-worker-size: 1
    async-operation-package-name: com.snowcattle.game.db
    sharding:
      db-count: 3
      table-count: 2
      data-source-prefix: jdbc_player_db
      page-limit: 50
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    db0:
      url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB0:db_0}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:123456}
    db1:
      url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB1:db_1}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:123456}
    db2:
      url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB2:db_2}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:123456}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    timeout-ms: 3000
    pool:
      max-idle: 30
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      num-tests-per-eviction-run: 30
      min-evictable-idle-time-millis: 60000
