# 仅用于 src/test/resources 的 ClassPathXmlApplicationContext（用于隔离 test/prod 配置冲突）
# JDBC/Redis 都走 MySQL（不引入 H2），避免生产/测试环境互相抢同名资源

# --- datasource ---
game.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 与 MySQL 8 本地开发常用：SSL、公钥、时区（可按环境调整）
game.datasource.url-params=useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
game.datasource.db0.url=jdbc:mysql://localhost:3306/db_0?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
game.datasource.db0.username=root
game.datasource.db0.password=123456
game.datasource.db1.url=jdbc:mysql://localhost:3306/db_1?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
game.datasource.db1.username=root
game.datasource.db1.password=123456
game.datasource.db2.url=jdbc:mysql://localhost:3306/db_2?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
game.datasource.db2.username=root
game.datasource.db2.password=123456

# --- redis ---
game.redis.host=127.0.0.1
game.redis.port=6379
game.redis.timeout-ms=3000

# --- db feature flags ---
game.db.use-redis-flag=${GAME_DB_USE_REDIS:true}

# --- mybatis ---
game.mybatis.config-location=classpath:mybatis3/sqlMapConfig.xml
game.mybatis.mapper-locations=classpath*:mybatis3/mappers/*Mapper.xml

